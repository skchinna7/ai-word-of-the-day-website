<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Word of the Day</title>
    <link rel="icon" type="image/jpg" href="images/logo.jpg">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="notLoggedIn" class="denied" style="display:none;">
        <h1>🔐 Login Required</h1>
        <p>You must be logged in as admin to access this page.</p>
        <p style="margin-top: 20px;">
            <a href="login.html">Login</a> | <a href="index.html">Go Home</a>
        </p>
    </div>

    <div id="adminPanel" style="display:none;">
        <h1>🎛️ Admin Panel</h1>
        <div class="user-info">
            <div>
                Logged in as: <strong id="userEmail">Loading...</strong>
                <div style="margin-top: 10px;">
                    <span class="admin-stat-badge">
                        📚 <strong id="wordCountAdmin">0</strong> Total Words
                    </span>
                </div>
            </div>
            <div>
                <a href="index.html" style="margin-right: 10px;">← Home</a>
                <button id="logoutBtn" style="padding: 8px 16px;">Logout</button>
            </div>
        </div>
        
        <div class="stats-banner">
            <div class="stat-box">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">Total Words</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalViews">0</div>
                <div class="stat-label">Total Views</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalSubscribers">0</div>
                <div class="stat-label">Subscribers</div>
            </div>
        </div>

        <div class="form-container">
            <h2 id="formTitle">Add New Word</h2>
            <form id="wordForm">
                <input type="hidden" id="editId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Word *</label>
                        <input type="text" id="word" required>
                        <div id="duplicateWarning" style="display:none; padding: 10px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; margin-top: 10px; color: #856404;">
                            ⚠️ This word already exists in the database!
                        </div>
                        <button type="button" class="btn-secondary btn-full-width" id="autoFetchBtn" style="margin-top: 10px;">
                            🤖 Auto-Fill All Details
                        </button>
                        <div id="fetchStatus" style="margin-top: 10px; font-size: 14px;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Scheduled Date *</label>
                        <input type="date" id="scheduled" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Phonetic (e.g., /səˈrɛndɪpɪti/)</label>
                        <input type="text" id="phonetic" placeholder="Will auto-fill">
                    </div>
                    
                    <div class="form-group">
                        <label>Pronunciation (e.g., ser-en-dip-i-ty)</label>
                        <input type="text" id="pronunciation" placeholder="Will auto-fill">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Part of Speech</label>
                        <select id="partOfSpeech">
                            <option value="">Auto-detect</option>
                            <option value="noun">Noun</option>
                            <option value="verb">Verb</option>
                            <option value="adjective">Adjective</option>
                            <option value="adverb">Adverb</option>
                            <option value="pronoun">Pronoun</option>
                            <option value="preposition">Preposition</option>
                            <option value="conjunction">Conjunction</option>
                            <option value="interjection">Interjection</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Synonyms (comma separated)</label>
                        <input type="text" id="synonyms" placeholder="e.g., happy, joyful, cheerful">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Antonyms (comma separated)</label>
                    <input type="text" id="antonyms" placeholder="e.g., sad, unhappy, miserable">
                </div>
                
                <div class="form-group">
                    <label>Meaning *</label>
                    <textarea id="meaning" required></textarea>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="submitBtn">Add Word</button>
                    <button type="button" class="btn-secondary" id="cancelBtn" style="display: none;">Cancel</button>
                </div>
            </form>
            <div id="msg" style="display:none"></div>
        </div>
        
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>All Words</h2>
                
                <!-- Filter Buttons -->
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="today">Today</button>
                    <button class="filter-btn" data-filter="week">This Week</button>
                    <button class="filter-btn" data-filter="month">This Month</button>
                    <button class="filter-btn" data-filter="year">This Year</button>
                </div>
            </div>
            
            <div id="filterInfo" style="margin-bottom: 15px; color: #666; font-size: 14px;"></div>
            <div id="list">Loading...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('🔧 Admin panel starting...');
        
        const sb = window.supabase.createClient(
            "https://qzatavslhtkioivemwlk.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6YXRhdnNsaHRraW9pdmVtd2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1MzIyMTYsImV4cCI6MjA4NjEwODIxNn0.LaNyj8T6VYGMMbuyX-Fg_6Fm6yIhPLTW0enYd6sNdGE"
        );
        
        let isEditing = false;
        let currentFilter = 'all';
        
        // Check auth
        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            
            if (!session) {
                document.getElementById('notLoggedIn').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                return false;
            }
            
            document.getElementById('notLoggedIn').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('userEmail').textContent = session.user.email;
            return true;
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await sb.auth.signOut();
            window.location.href = 'login.html';
        });
        
        // Load stats
        async function loadStats() {
            try {
                const { data: words } = await sb.from('words').select('id, views');
                const wordCount = words ? words.length : 0;
                const totalViews = words ? words.reduce((sum, w) => sum + (w.views || 0), 0) : 0;
                
                document.getElementById('totalWords').textContent = wordCount;
                document.getElementById('totalViews').textContent = totalViews;
                document.getElementById('wordCountAdmin').textContent = wordCount;
                
                const { data: subs } = await sb.from('subscribers').select('id');
                document.getElementById('totalSubscribers').textContent = subs ? subs.length : 0;
                
            } catch (error) {
                console.error('Stats error:', error);
            }
        }
        
        // Check for duplicate word
        document.getElementById('word').addEventListener('blur', async function() {
            const wordInput = this.value.trim().toLowerCase();
            const editId = document.getElementById('editId').value;
            const warningDiv = document.getElementById('duplicateWarning');
            
            if (!wordInput) {
                warningDiv.style.display = 'none';
                return;
            }
            
            try {
                const { data: existing } = await sb
                    .from('words')
                    .select('id, word')
                    .ilike('word', wordInput)
                    .limit(1);
                
                if (existing && existing.length > 0 && existing[0].id !== editId) {
                    warningDiv.style.display = 'block';
                } else {
                    warningDiv.style.display = 'none';
                }
            } catch (error) {
                console.error('Duplicate check error:', error);
            }
        });
        
        // Enhanced Auto-fetch with fallbacks
        document.getElementById('autoFetchBtn').addEventListener('click', async function() {
            const wordInput = document.getElementById('word').value.trim();
            const fetchStatus = document.getElementById('fetchStatus');
            
            if (!wordInput) {
                fetchStatus.innerHTML = '<span style="color: #f44336;">⚠️ Enter a word first</span>';
                return;
            }
            
            fetchStatus.innerHTML = '<span style="color: #2196F3;">🔄 Fetching from dictionary...</span>';
            
            try {
                // Try Free Dictionary API
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${wordInput}`);
                
                if (!response.ok) throw new Error('Word not found');
                
                const data = await response.json();
                const entry = data[0];
                
                // Extract phonetic - try multiple sources
                let phoneticFound = false;
                
                // Method 1: Direct phonetic field
                if (entry.phonetic) {
                    document.getElementById('phonetic').value = entry.phonetic;
                    phoneticFound = true;
                }
                
                // Method 2: Phonetics array
                if (!phoneticFound && entry.phonetics && entry.phonetics.length > 0) {
                    for (let p of entry.phonetics) {
                        if (p.text) {
                            document.getElementById('phonetic').value = p.text;
                            phoneticFound = true;
                            break;
                        }
                    }
                }
                
                // Create pronunciation from phonetic
                const phoneticVal = document.getElementById('phonetic').value;
                if (phoneticVal) {
                    // Convert IPA to simplified pronunciation
                    const simplified = phoneticVal
                        .replace(/[\/\[\]]/g, '') // Remove slashes/brackets
                        .replace(/ˈ/g, '-') // Primary stress becomes hyphen
                        .replace(/ˌ/g, '') // Remove secondary stress
                        .replace(/ː/g, '') // Remove length marks
                        .replace(/ə/g, 'uh') // Schwa
                        .replace(/θ/g, 'th')
                        .replace(/ð/g, 'th')
                        .replace(/ʃ/g, 'sh')
                        .replace(/ʒ/g, 'zh')
                        .replace(/ŋ/g, 'ng')
                        .replace(/æ/g, 'a')
                        .replace(/ɑ/g, 'ah')
                        .replace(/ɔ/g, 'aw')
                        .replace(/ɛ/g, 'e')
                        .replace(/ɪ/g, 'i')
                        .replace(/ʊ/g, 'u')
                        .trim();
                    
                    document.getElementById('pronunciation').value = simplified;
                } else {
                    // Fallback: create simple pronunciation from word
                    const simple = wordInput.toLowerCase()
                        .replace(/([a-z])([A-Z])/g, '$1-$2')
                        .replace(/([aeiou])\1+/g, '$1');
                    document.getElementById('pronunciation').value = simple;
                }
                
                // Process meanings
                let synonyms = new Set();
                let antonyms = new Set();
                
                if (entry.meanings && entry.meanings.length > 0) {
                    const firstMeaning = entry.meanings[0];
                    
                    // Part of speech
                    if (firstMeaning.partOfSpeech) {
                        document.getElementById('partOfSpeech').value = firstMeaning.partOfSpeech;
                    }
                    
                    // Definition
                    if (firstMeaning.definitions && firstMeaning.definitions[0]) {
                        document.getElementById('meaning').value = firstMeaning.definitions[0].definition;
                    }
                    
                    // Collect ALL synonyms and antonyms from ALL meanings
                    entry.meanings.forEach(meaning => {
                        // Top-level
                        if (meaning.synonyms) meaning.synonyms.forEach(s => synonyms.add(s));
                        if (meaning.antonyms) meaning.antonyms.forEach(a => antonyms.add(a));
                        
                        // Definition-level
                        if (meaning.definitions) {
                            meaning.definitions.forEach(def => {
                                if (def.synonyms) def.synonyms.forEach(s => synonyms.add(s));
                                if (def.antonyms) def.antonyms.forEach(a => antonyms.add(a));
                            });
                        }
                    });
                }
                
                // Set synonyms
                if (synonyms.size > 0) {
                    document.getElementById('synonyms').value = Array.from(synonyms).slice(0, 10).join(', ');
                } else {
                    // Try DataMuse API as fallback
                    fetchStatus.innerHTML = '<span style="color: #2196F3;">🔄 Finding synonyms...</span>';
                    await fetchDataMuseSynonyms(wordInput);
                }
                
                // Set antonyms
                if (antonyms.size > 0) {
                    document.getElementById('antonyms').value = Array.from(antonyms).slice(0, 10).join(', ');
                } else {
                    // Try DataMuse API as fallback
                    await fetchDataMuseAntonyms(wordInput);
                }
                
                const synCount = synonyms.size || document.getElementById('synonyms').value.split(',').filter(s => s.trim()).length;
                const antCount = antonyms.size || document.getElementById('antonyms').value.split(',').filter(s => s.trim()).length;
                
                fetchStatus.innerHTML = `
                    <span style="color: #4CAF50;">
                        ✅ Loaded! Found: ${phoneticFound ? 'phonetic, ' : ''}${synCount} synonyms, ${antCount} antonyms
                    </span>
                `;
                setTimeout(() => fetchStatus.innerHTML = '', 5000);
                
            } catch (error) {
                console.error('Fetch error:', error);
                fetchStatus.innerHTML = `
                    <span style="color: #ff9800;">
                        ⚠️ Dictionary lookup failed. Trying alternative sources...
                    </span>
                `;
                
                // Try DataMuse as complete fallback
                await fetchDataMuseSynonyms(wordInput);
                await fetchDataMuseAntonyms(wordInput);
                
                setTimeout(() => {
                    fetchStatus.innerHTML = '<span style="color: #666;">Please fill in remaining fields manually.</span>';
                }, 2000);
            }
        });
        
        // DataMuse API fallback for synonyms
        async function fetchDataMuseSynonyms(word) {
            try {
                const response = await fetch(`https://api.datamuse.com/words?rel_syn=${word}&max=10`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const currentSyns = document.getElementById('synonyms').value;
                    if (!currentSyns) {
                        document.getElementById('synonyms').value = data.map(s => s.word).join(', ');
                    }
                }
            } catch (error) {
                console.log('DataMuse synonyms failed');
            }
        }
        
        // DataMuse API fallback for antonyms
        async function fetchDataMuseAntonyms(word) {
            try {
                const response = await fetch(`https://api.datamuse.com/words?rel_ant=${word}&max=10`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const currentAnts = document.getElementById('antonyms').value;
                    if (!currentAnts) {
                        document.getElementById('antonyms').value = data.map(a => a.word).join(', ');
                    }
                }
            } catch (error) {
                console.log('DataMuse antonyms failed');
            }
        }
        
        // Form submit
        document.getElementById('wordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = isEditing ? 'Updating...' : 'Adding...';
            
            try {
                const wordData = {
                    word: document.getElementById('word').value.trim(),
                    meaning: document.getElementById('meaning').value.trim(),
                    scheduled_for: document.getElementById('scheduled').value,
                    phonetic: document.getElementById('phonetic').value.trim() || null,
                    pronunciation: document.getElementById('pronunciation').value.trim() || null,
                    part_of_speech: document.getElementById('partOfSpeech').value || null,
                    synonyms: document.getElementById('synonyms').value.trim() 
                        ? document.getElementById('synonyms').value.split(',').map(x => x.trim()).filter(x => x)
                        : null,
                    antonyms: document.getElementById('antonyms').value.trim() 
                        ? document.getElementById('antonyms').value.split(',').map(x => x.trim()).filter(x => x)
                        : null
                };
                
                const editId = document.getElementById('editId').value;
                let error;
                
                if (isEditing && editId) {
                    ({ error } = await sb.from('words').update(wordData).eq('id', editId));
                } else {
                    ({ error } = await sb.from('words').insert(wordData));
                }
                
                if (error) throw error;
                
                const msg = document.getElementById('msg');
                msg.className = 'message success';
                msg.textContent = isEditing ? '✅ Updated!' : '✅ Added!';
                msg.style.display = 'block';
                
                document.getElementById('word').value = '';
                document.getElementById('meaning').value = '';
                document.getElementById('phonetic').value = '';
                document.getElementById('pronunciation').value = '';
                document.getElementById('partOfSpeech').value = '';
                document.getElementById('synonyms').value = '';
                document.getElementById('antonyms').value = '';
                document.getElementById('scheduled').valueAsDate = new Date();
                document.getElementById('duplicateWarning').style.display = 'none';
                
                cancelEdit();
                loadWords();
                loadStats();
                
                setTimeout(() => msg.style.display = 'none', 3000);
                
            } catch (error) {
                const msg = document.getElementById('msg');
                msg.className = 'message error';
                msg.textContent = '❌ ' + error.message;
                msg.style.display = 'block';
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = isEditing ? 'Update Word' : 'Add Word';
        });
        
        // Edit
        window.editWord = function(id) {
            sb.from('words').select('*').eq('id', id).single()
                .then(({ data }) => {
                    isEditing = true;
                    document.getElementById('formTitle').textContent = 'Edit Word';
                    document.getElementById('editId').value = data.id;
                    document.getElementById('word').value = data.word;
                    document.getElementById('meaning').value = data.meaning;
                    document.getElementById('scheduled').value = data.scheduled_for;
                    document.getElementById('phonetic').value = data.phonetic || '';
                    document.getElementById('pronunciation').value = data.pronunciation || '';
                    document.getElementById('partOfSpeech').value = data.part_of_speech || '';
                    document.getElementById('synonyms').value = data.synonyms ? data.synonyms.join(', ') : '';
                    document.getElementById('antonyms').value = data.antonyms ? data.antonyms.join(', ') : '';
                    document.getElementById('submitBtn').textContent = 'Update Word';
                    document.getElementById('cancelBtn').style.display = 'inline-block';
                    document.getElementById('duplicateWarning').style.display = 'none';
                    window.scrollTo(0, 0);
                });
        };
        
        // Cancel edit
        document.getElementById('cancelBtn').addEventListener('click', cancelEdit);
        
        function cancelEdit() {
            isEditing = false;
            document.getElementById('formTitle').textContent = 'Add New Word';
            document.getElementById('editId').value = '';
            document.getElementById('word').value = '';
            document.getElementById('meaning').value = '';
            document.getElementById('phonetic').value = '';
            document.getElementById('pronunciation').value = '';
            document.getElementById('partOfSpeech').value = '';
            document.getElementById('synonyms').value = '';
            document.getElementById('antonyms').value = '';
            document.getElementById('scheduled').valueAsDate = new Date();
            document.getElementById('submitBtn').textContent = 'Add Word';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('duplicateWarning').style.display = 'none';
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                loadWords();
            });
        });
        
        // Load words with filter
        async function loadWords() {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                let query = sb.from('words').select('*');
                let filterText = 'Showing all words';
                
                // Apply filter
                if (currentFilter === 'today') {
                    const todayStr = today.toISOString().split('T')[0];
                    query = query.eq('scheduled_for', todayStr);
                    filterText = 'Showing words scheduled for today';
                } else if (currentFilter === 'week') {
                    const weekAgo = new Date(today);
                    weekAgo.setDate(today.getDate() - 7);
                    const weekFromNow = new Date(today);
                    weekFromNow.setDate(today.getDate() + 7);
                    
                    query = query
                        .gte('scheduled_for', weekAgo.toISOString().split('T')[0])
                        .lte('scheduled_for', weekFromNow.toISOString().split('T')[0]);
                    filterText = 'Showing words from this week (±7 days)';
                } else if (currentFilter === 'month') {
                    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
                    const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    
                    query = query
                        .gte('scheduled_for', monthStart.toISOString().split('T')[0])
                        .lte('scheduled_for', monthEnd.toISOString().split('T')[0]);
                    filterText = 'Showing words from this month';
                } else if (currentFilter === 'year') {
                    const yearStart = new Date(today.getFullYear(), 0, 1);
                    const yearEnd = new Date(today.getFullYear(), 11, 31);
                    
                    query = query
                        .gte('scheduled_for', yearStart.toISOString().split('T')[0])
                        .lte('scheduled_for', yearEnd.toISOString().split('T')[0]);
                    filterText = 'Showing words from this year';
                }
                
                const {data, error} = await query.order('scheduled_for', {ascending: false});
                
                if (error) throw error;
                
                document.getElementById('filterInfo').textContent = filterText + ` (${data ? data.length : 0} words)`;
                
                const list = document.getElementById('list');
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<p>No words found for this filter.</p>';
                    return;
                }
                
                const todayStr = today.toISOString().split('T')[0];
                
                list.innerHTML = '<table><tr><th>Date</th><th>Word</th><th>Part of Speech</th><th>Meaning</th><th>Actions</th></tr>' +
                    data.map(w => {
                        const isToday = w.scheduled_for === todayStr;
                        return `<tr class="${isToday ? 'today-row' : ''}">
                            <td>${w.scheduled_for || 'N/A'} ${isToday ? '<b>(TODAY)</b>' : ''}</td>
                            <td>
                                <b>${w.word}</b>
                                ${w.pronunciation ? `<br><small style="color: #666;">${w.pronunciation}</small>` : ''}
                            </td>
                            <td>
                                ${w.part_of_speech || '-'}
                                ${w.phonetic ? `<br><small style="color: #999;">${w.phonetic}</small>` : ''}
                            </td>
                            <td>${w.meaning.substring(0, 60)}...</td>
                            <td>
                                <button class="btn-edit" onclick="editWord('${w.id}')">Edit</button>
                                <button class="btn-delete" onclick="deleteWord('${w.id}')">Delete</button>
                            </td>
                        </tr>`;
                    }).join('') + '</table>';
                    
            } catch (error) {
                console.error('Load error:', error);
            }
        }
        
        // Delete
        window.deleteWord = async (id) => {
            if (!confirm('Delete this word?')) return;
            try {
                const {error} = await sb.from('words').delete().eq('id', id);
                if (error) throw error;
                loadWords();
                loadStats();
            } catch (error) {
                alert('Delete failed: ' + error.message);
            }
        };
        
        // Set default date
        document.getElementById('scheduled').valueAsDate = new Date();
        
        // Initialize
        checkAuth().then(ok => { 
            if(ok) {
                loadWords();
                loadStats();
            }
        });
        
        console.log('✅ Admin ready');
    </script>
</body>
</html>
