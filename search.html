<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Words - Word of the Day</title>
    <link rel="icon" type="image/jpg" href="images/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-light">
    <!-- Same Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.jpg" alt="Logo" width="40" height="40" class="rounded-circle me-2">
                <span class="fw-bold">Word of the Day</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="search.html"><i class="bi bi-search"></i> Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="trending.html"><i class="bi bi-fire"></i> Trending</a></li>
                    <li class="nav-item"><a class="nav-link" href="archive.html"><i class="bi bi-archive"></i> Archive</a></li>
                    <li class="nav-item"><a class="nav-link" href="suggest.html"><i class="bi bi-lightbulb"></i> Suggest</a></li>
                    <li class="nav-item"><button class="btn btn-sm btn-outline-light ms-2" id="themeToggle"><i class="bi bi-moon-fill"></i></button></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card bg-dark border-secondary">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-4">
                            <i class="bi bi-search text-primary"></i> Search Words
                        </h2>
                        
                        <!-- Search Input -->
                        <div class="input-group input-group-lg mb-4">
                            <span class="input-group-text bg-secondary border-secondary">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control bg-dark text-light border-secondary" 
                                   id="searchInput" 
                                   placeholder="Type to search words..."
                                   autofocus>
                        </div>
                        
                        <!-- Search Stats -->
                        <div id="searchStats" class="text-white-50 mb-3"></div>
                        
                        <!-- Results -->
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
